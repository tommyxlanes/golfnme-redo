version: "3.9"

services:
  app:
    build:
      target: deps
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - /app/node_modules/.prisma
    environment:
      NODE_ENV: development
    command: sh -c "npx prisma generate && npm run dev"
    healthcheck:
      disable: true

  worker:
    build:
      target: deps
    volumes:
      - .:/app
      - /app/node_modules
      - /app/node_modules/.prisma
    environment:
      NODE_ENV: development
    command: sh -c "npx prisma generate && node_modules/.bin/tsx --watch worker/worker.ts"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      app:
        condition: service_started # ← replaces service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "8081:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  bull-board:
    profiles: []
