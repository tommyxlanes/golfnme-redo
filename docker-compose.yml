version: "3.9"

x-app-env: &app-env
  DATABASE_URL: postgresql://golf:${POSTGRES_PASSWORD}@pgbouncer:6432/golfnme?schema=public&pgbouncer=true&connection_limit=1
  NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
  NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
  ABLY_API_KEY: ${ABLY_API_KEY:-}
  NEXT_PUBLIC_ABLY_KEY: ${NEXT_PUBLIC_ABLY_KEY:-}
  REDIS_URL: redis://redis:6379
  NODE_ENV: ${NODE_ENV:-production}

services:
  pgbouncer:
    image: pgautofailover/pgbouncer:latest
    restart: unless-stopped
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_DBNAME: golfnme
      DATABASES_USER: golf
      DATABASES_PASSWORD: ${POSTGRES_PASSWORD}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 100
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U golf"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
  # ───────────────────────────────────────────
  # PostgreSQL
  # ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-golf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-golfpass}
      POSTGRES_DB: ${POSTGRES_DB:-golfnme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-golf} -d ${POSTGRES_DB:-golfnme}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ───────────────────────────────────────────
  # Redis — BullMQ + optional Socket.io adapter
  # ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ───────────────────────────────────────────
  # Next.js App
  # Runs: prisma migrate deploy → tsx server.ts
  # ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      <<: *app-env
    ports:
      - "3000:3000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - external
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.golfnme.rule=Host(`${APP_DOMAIN:-localhost}`)"
      - "traefik.http.routers.golfnme.entrypoints=websecure"
      - "traefik.http.routers.golfnme.tls.certresolver=letsencrypt"

  # ───────────────────────────────────────────
  # BullMQ Worker
  # Waits for app to be healthy (migrations done) before starting
  # ───────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
      target: runner
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ───────────────────────────────────────────
  # Bull Board — queue dashboard (dev profile only)
  # ───────────────────────────────────────────
  bull-board:
    image: deadly0/bull-board:latest
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3001:3000"
    depends_on:
      - redis
    networks:
      - internal
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
